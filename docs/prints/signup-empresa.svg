<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Tela de cadastro de empresa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="250" y="80" width="780" height="560" rx="20" fill="#ffffff"/>
  <text x="290" y="140" font-family="Segoe UI, Arial" font-size="34" fill="#111827" font-weight="700">Cadastro da Empresa</text>
  <text x="290" y="175" font-family="Segoe UI, Arial" font-size="18" fill="#6b7280">Onboarding SaaS com criação automática do admin</text>

  <rect x="290" y="220" width="700" height="56" rx="10" fill="#f3f4f6"/>
  <text x="310" y="255" font-family="Segoe UI, Arial" font-size="20" fill="#6b7280">Nome da empresa</text>

  <rect x="290" y="295" width="340" height="56" rx="10" fill="#f3f4f6"/>
  <text x="310" y="330" font-family="Segoe UI, Arial" font-size="20" fill="#6b7280">Nome do admin</text>

  <rect x="650" y="295" width="340" height="56" rx="10" fill="#f3f4f6"/>
  <text x="670" y="330" font-family="Segoe UI, Arial" font-size="20" fill="#6b7280">Email</text>

  <rect x="290" y="370" width="700" height="56" rx="10" fill="#f3f4f6"/>
  <text x="310" y="405" font-family="Segoe UI, Arial" font-size="20" fill="#6b7280">Senha</text>

  <rect x="290" y="460" width="700" height="64" rx="12" fill="#0f766e"/>
  <text x="530" y="500" font-family="Segoe UI, Arial" font-size="24" fill="#ffffff" font-weight="700">Criar empresa</text>

  <rect x="290" y="545" width="340" height="32" rx="16" fill="#dcfce7"/>
  <text x="310" y="567" font-family="Segoe UI, Arial" font-size="16" fill="#166534">Plano inicial: TRIAL (14 dias)</text>
</svg>
